<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuário NOVO</title>
</head>
<body>
    <div>
        <div>
            <label for="equipes">Equipes</label>
            <input list="equipes" name="equipes">
            <datalist id="equipes">
                <option value="Edge">
                <option value="Firefox">
                <option value="Chrome">
                <option value="Opera">
                <option value="Safari">
            </datalist>
        </div>
    </div>
    <div>
        <div>
            <label for="email">E-mail</label>
            <input type="text" id="email">
        </div>
    </div>
    <div>
        <div>
            <label for="senha">Senha</label>
            <input type="text" id="senha">
        </div>
    </div>
    <div>
        <div>
            <button type="submit" id="enviar">Enviar</button>
        </div>
    </div>
    <script src="../js/funcionario_novo.js"></script>
</body>
</html>
