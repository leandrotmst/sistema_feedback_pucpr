<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Funcionário</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex items-center justify-center">
    <div class="card card-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-primary">Cadastrar Funcionário</h1>
        <div class="space-y-4">
            <div class="form-group">
                <label for="equipe" class="form-label">Equipes</label>
                <input type="text" id="equipe" name="equipe" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" name="senha" class="form-input" required>
            </div>
            <div class="flex space-x-4 mt-6">
                <button type="button" onclick="window.location.href='../gestor/funcionarios.html'" class="btn btn-secondary flex-1">Voltar</button>
                <button type="submit" id="enviar" class="btn btn-primary flex-1">Cadastrar Funcionário</button>
            </div>
        </div>
    </div>
    <script src="../js/funcionario_novo.js"></script>
</body>
</html>
