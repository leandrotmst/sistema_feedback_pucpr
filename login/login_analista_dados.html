<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Analista de Dados | Sistema de Feedback</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex items-center justify-center">
    <div class="card card-sm">
        <h1 class="text-2xl font-bold text-center mb-6 text-primary">Login Analista de Dados</h1>
        <div class="space-y-4">
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" name="email" required class="form-input">
            </div>
            <div class="form-group">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" name="senha" required class="form-input">
            </div>

            <div class="flex space-x-4 mt-6">
                <button type="button" onclick="window.location.href='../index.html'" class="btn btn-secondary flex-1">Voltar</button>
                <button id="entrar" type="submit" class="btn btn-primary flex-1">Entrar</button>
            </div>
        </div>
    </div>
    <script src="../js/analista_dados_login.js"></script>
</body>
</html>
