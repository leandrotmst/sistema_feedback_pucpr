<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Gestor | Admin</title>
    <link rel="stylesheet" href="../css/usuario.css">
</head>
<body>
    <div class="container-principal">
        <h1 class="titulo-gerenciamento text-center mb-6">Cadastrar Gestor</h1>
        <form class="space-y-4">
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" name="senha" class="form-input" required>
            </div>
            <div class="flex space-x-4 mt-6" style="display: flex; gap: 10px;">
                <button type="button" onclick="window.location.href='index.html'" class="btn-novo-usuario" style="background-color: #6c757d; flex: 1; text-align: center;">Voltar</button>
                <button type="button" id="enviar" class="btn-novo-usuario" style="flex: 1; text-align: center;">Cadastrar</button>
            </div>
        </form>
    </div>
    <script src="../js/admin_valida_sessao.js"></script>
    <script src="../js/gestor_novo.js"></script>
</body>
</html>
