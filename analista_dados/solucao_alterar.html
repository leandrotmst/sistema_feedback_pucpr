<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Solução</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex items-center justify-center">
    <div class="card card-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-primary">Editar Solução</h1>
        <div class="space-y-4">
            <div class="form-group">
                <label for="titulo" class="form-label">Título da Solução</label>
                <input type="text" id="titulo" name="titulo" class="form-input" required>
                <input type="hidden" id="id_solucao" name="id_solucao">
            </div>
            <div class="form-group">
                <label for="equipe" class="form-label">Equipe Alvo</label>
                <input type="text" id="equipe" name="equipe" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea id="descricao" name="descricao" class="form-input" rows="4" required></textarea>
            </div>
            <div class="flex space-x-4 mt-6">
                <button type="button" onclick="window.history.back()" class="btn btn-secondary flex-1">Voltar</button>
                <button id="salvar" class="btn btn-primary flex-1">Salvar Alterações</button>
            </div>
        </div>
    </div>
    <script src="../js/solucao_alterar.js"></script>
</body>
</html>
