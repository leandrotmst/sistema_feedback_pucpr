<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Analista de Dados</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex items-center justify-center">
    <div class="card card-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-primary">Editar Analista de Dados</h1>
        <div class="space-y-4">
            <input type="hidden" id="id_analista_dados" name="id_analista_dados">
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" class="form-input">
            </div>
            <div class="form-group">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" class="form-input">
            </div>
            <div class="flex space-x-4 mt-6">
                <button type="button" onclick="window.history.back()" class="btn btn-secondary flex-1">Voltar</button>
                <button id="salvar" class="btn btn-primary flex-1">Salvar Alterações</button>
            </div>
        </div>
    </div>
    <script src="../js/analista_dados_alterar.js"></script>
</body>
</html>
