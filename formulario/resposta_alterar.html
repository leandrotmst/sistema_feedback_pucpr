<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/respostas_alterar.css">
    <title>Respostas — formulário</title>
</head>
<body>
    <h1>Resposta semanal</h1>

    <fieldset>
        <legend>Como você avalia o emocional / estresse na semana? (0 a 5)</legend>
        <label><input type="radio" name="nivel" value="0" required> 0</label>
        <label><input type="radio" name="nivel" value="1"> 1</label>
        <label><input type="radio" name="nivel" value="2"> 2</label>
        <label><input type="radio" name="nivel" value="3"> 3</label>
        <label><input type="radio" name="nivel" value="4"> 4</label>
        <label><input type="radio" name="nivel" value="5"> 5</label>
        <input type="hidden" id="id_resposta" name="id_resposta">
    </fieldset>

    <div>
        <label for="texto">Resumo de como foi a semana</label>
        <input type="text" id="texto" name="texto">
    </div>

    <div>
        <button type="submit" id="salvar">Salvar</button>
    </div>

    <script src="../js/resposta_alterar.js"></script>
</body>
</html>
