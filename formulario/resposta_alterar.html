<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Resposta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-lg w-full">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Editar Resposta Semanal</h1>

        <fieldset class="mb-6">
            <legend class="text-sm font-medium text-gray-700 mb-4">Como você avalia o emocional / estresse na semana? (0 a 5)</legend>
            <div class="flex space-x-4">
                <label class="flex items-center"><input type="radio" name="nivel" value="0" required class="mr-2"> 0</label>
                <label class="flex items-center"><input type="radio" name="nivel" value="1" class="mr-2"> 1</label>
                <label class="flex items-center"><input type="radio" name="nivel" value="2" class="mr-2"> 2</label>
                <label class="flex items-center"><input type="radio" name="nivel" value="3" class="mr-2"> 3</label>
                <label class="flex items-center"><input type="radio" name="nivel" value="4" class="mr-2"> 4</label>
                <label class="flex items-center"><input type="radio" name="nivel" value="5" class="mr-2"> 5</label>
            </div>
            <input type="hidden" id="id_resposta" name="id_resposta">
        </fieldset>

        <div class="mb-6">
            <label for="texto" class="block text-sm font-medium text-gray-700 mb-2">Resumo de como foi a semana</label>
            <textarea id="texto" name="texto" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
            <input type="hidden" id="equipe" name="equipe">
            <input type="hidden" id="id_resposta" name="id_resposta">
        </div>

        <div>
            <button type="submit" id="salvar" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded transition duration-200">Salvar</button>
        </div>
    </div>

    <script src="../js/resposta_alterar.js"></script>
</body>
</html>
