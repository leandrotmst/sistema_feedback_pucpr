<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gerenciamento de Resposta</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen">
        <div class="container mx-auto p-8">
            <div class="bg-white p-8 rounded-lg shadow-md max-w-4xl mx-auto">
                <div class="header-gerenciamento flex justify-between items-center mb-6">
                    <h1 class="titulo-gerenciamento text-2xl font-bold text-gray-800">Respostas registradas</h1> 
                    <button id="novo" type="button" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded transition duration-200">+ Nova Resposta</button>
                </div>
                
                <h2 class="text-xl font-semibold mb-4">Respostas registradas</h2>
                <div id="lista" class="space-y-4"></div>
            </div>

            <div class="mt-6 flex justify-center">
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-6 rounded transition duration-200">Sair</button>
            </div>
        </div>
        
    <script src="../js/respostas.js"></script>
    <script src="../js/funcionario_valida_sessao.js"></script>
</body>
</html>
