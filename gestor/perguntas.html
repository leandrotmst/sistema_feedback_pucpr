<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor | Minhas Perguntas</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex items-center justify-center p-4">
    <div class="card" style="max-width: 900px; width: 100%;">
        <div class="header-gerenciamento" style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
            <h1 class="text-2xl font-bold text-primary">Minhas Perguntas</h1>
            <div>
                <a href="index.html" class="btn btn-secondary" style="margin-right: 10px;">Voltar</a>
                <button class="btn btn-primary" onclick="abrirModalNova()">+ Nova Pergunta</button>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #eee;">
                        <th style="padding: 10px;">ID</th>
                        <th style="padding: 10px;">Texto</th>
                        <th style="padding: 10px;">Equipe Alvo</th>
                        <th style="padding: 10px;">Status</th>
                        <th style="padding: 10px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaPerguntas">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Novo/Editar Pergunta -->
    <div id="modalPergunta" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="card" style="max-width: 500px; width: 100%;">
            <h2 id="modalTitle" class="text-xl font-bold mb-4">Nova Pergunta</h2>
            <form id="formPergunta" class="space-y-4">
                <input type="hidden" id="perguntaId">
                <div>
                    <label class="block text-sm font-medium mb-1">Texto da Pergunta</label>
                    <input type="text" id="perguntaTexto" required class="input-field" placeholder="Ex: Como você avalia o suporte interno?">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Equipe Alvo</label>
                    <input type="text" id="perguntaEquipe" required class="input-field" value="Todas" placeholder="Ex: Todas, TI, Marketing">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Tipo de Campo</label>
                    <select id="perguntaTipo" class="input-field">
                        <option value="text">Texto Livre</option>
                        <option value="escala_1_5">Escala de 1 a 5</option>
                        <option value="sim_nao">Sim / Não</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Status</label>
                    <select id="perguntaAtiva" class="input-field">
                        <option value="1">Ativa</option>
                        <option value="0">Inativa</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2" style="margin-top: 1rem;">
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/gestor_valida_sessao.js"></script>
    <script src="../js/gestor_perguntas.js"></script>
</body>
</html>
